<!-- Clientes — migrated 1:1 from original index.html lines ~1277-1348 (marquee animation) -->
<section id="clients" class="py-16 bg-surface-container-lowest border-y border-outline-variant/30 overflow-hidden">
  <div appScrollReveal class="max-w-[1440px] mx-auto px-margin-mobile md:px-margin-desktop text-center mb-10 reveal-on-scroll">
    <h4 class="font-label-sm text-sm text-on-surface-variant uppercase tracking-widest font-bold">
      Confían en nuestra ingeniería
    </h4>
  </div>

  <div appScrollReveal class="w-full inline-flex flex-nowrap overflow-hidden [mask-image:_linear-gradient(to_right,transparent_0,_black_128px,_black_calc(100%-128px),transparent_100%)] reveal-on-scroll animation-delay-200">
    <!-- Track 1 -->
    <div class="flex items-center animate-[clients-scroll_45s_linear_infinite] gap-16 md:gap-24 shrink-0 pr-16 md:pr-24">
      @for (logo of clientLogos; track logo) {
        <img
          [src]="logo"
          alt="Logotipo de empresa cliente y aliada de YAK Logística"
          loading="lazy"
          class="h-12 w-auto object-contain filter grayscale opacity-60 hover:grayscale-0 hover:opacity-100 hover:scale-105 transition-all duration-300 cursor-pointer"
        />
      }
    </div>
    <!-- Track 2 (Duplicate for infinite seamless loop) -->
    <div class="flex items-center animate-[clients-scroll_45s_linear_infinite] gap-16 md:gap-24 shrink-0 pr-16 md:pr-24" aria-hidden="true">
      @for (logo of clientLogos; track 'dup-' + logo) {
        <img
          [src]="logo"
          alt="Logotipo de empresa cliente y aliada de YAK Logística"
          loading="lazy"
          class="h-12 w-auto object-contain filter grayscale opacity-60 hover:grayscale-0 hover:opacity-100 hover:scale-105 transition-all duration-300 cursor-pointer"
        />
      }
    </div>
  </div>
</section>
